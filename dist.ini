name    = PDF-Data
author  = Deven T. Corzine <deven@ties.org>
license = MIT
copyright_holder = Deven T. Corzine, IntelliTree Solutions LLC
copyright_year   = 2020-2026

[@Starter]
revision = 5

[@Git]
allow_dirty = dist.ini
allow_dirty = Changes
allow_dirty = README.md

[AutoPrereqs]
[VersionFromMainModule]

[PruneFiles]
match = ^dist/

[ReadmeAnyFromPod / README.md]
type = markdown
source_filename = lib/PDF/Data.pm
filename = README.md
location = root

[MetaResources]
homepage        = https://github.com/deven/PDF-Data
repository.url  = https://github.com/deven/PDF-Data.git
repository.web  = https://github.com/deven/PDF-Data
repository.type = git
bugtracker.web  = https://github.com/deven/PDF-Data/issues
